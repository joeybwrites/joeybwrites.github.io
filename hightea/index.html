<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>High Tea Check-In</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --bg:#0f1115; --panel:#191c23; --line:#2c3140; --text:#f2f3f7; --muted:#9aa0b0;
    --green:#34d399; --red:#f87171; --amber:#fbbf24; --accent:#5fb0b0; --brand:#cf5b4d;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,system-ui,"Segoe UI",sans-serif}
  body{display:flex;flex-direction:column;max-width:560px;margin:0 auto;padding:14px;min-height:100%}
  header{text-align:center;padding-bottom:10px;border-bottom:1px solid var(--line)}
  h1{font-size:20px;font-weight:700}
  header .sub{color:var(--accent);font-size:13px;margin-top:3px}
  .count{text-align:center;padding:14px 0 6px}
  .count .n{font-size:72px;font-weight:800;line-height:1;color:var(--brand)}
  .count .cap{font-size:20px;color:var(--muted);font-weight:600}
  .count.over .n{color:var(--amber)}
  .remain{text-align:center;color:var(--accent);font-size:14px;margin-bottom:8px}
  #reader{width:100%;max-width:360px;aspect-ratio:1/1;margin:0 auto;border-radius:14px;overflow:hidden;background:#000;min-height:60px}
  #reader video{width:100%!important;height:100%!important;object-fit:cover!important}
  .flash{height:54px;border-radius:12px;margin:10px 0;display:flex;align-items:center;
    justify-content:center;font-size:18px;font-weight:700;background:var(--panel);
    color:var(--muted);transition:background .12s,color .12s}
  .flash.ok{background:rgba(52,211,153,.18);color:var(--green)}
  .flash.bad{background:rgba(248,113,113,.18);color:var(--red)}
  .row{display:flex;gap:10px;margin-top:auto}
  button{flex:1;border:1px solid var(--line);background:var(--panel);color:var(--text);
    font-size:17px;font-weight:600;font-family:inherit;padding:15px 0;border-radius:12px;cursor:pointer}
  button:active{background:#23262f}
  button.primary{background:var(--accent);color:#08201f;border:0}
  button.danger{color:var(--red)}
  .small{font-size:14px;padding:11px 0}
  .controls{display:flex;gap:10px;margin-top:10px}
  .dbg{color:var(--muted);font-size:12px;text-align:center;min-height:15px;
    margin:-4px 0 6px;word-break:break-all}
  footer{color:var(--muted);font-size:12px;text-align:center;margin-top:10px;line-height:1.4}
</style>
</head>
<body>
  <header>
    <h1>Platinum High Tea &mdash; Check-In</h1>
    <div class="sub">July 12, 2026 &middot; Summerour Studio</div>
  </header>

  <div class="count" id="countBox">
    <span class="n" id="count">0</span><span class="cap" id="cap"> / 190</span>
  </div>
  <div class="remain" id="remain"></div>

  <div id="reader"></div>
  <div class="flash" id="flash">Tap Start Camera to begin</div>
  <div class="dbg" id="dbg"></div>

  <div class="row">
    <button class="primary" id="startBtn">Start Camera</button>
    <button id="stopBtn">Stop</button>
  </div>
  <div class="controls">
    <button class="small" id="plus">+1 manual</button>
    <button class="small" id="minus">-1 undo</button>
    <button class="small danger" id="reset">Reset</button>
  </div>

  <footer>
    Each valid ticket scan adds 1. Hold one ticket at a time; it counts once, then
    waits ~2s for the next. Count is saved on this device.
  </footer>

<script>
(function(){
  var EVENT_CODE = "PHHT2026";   // must match the code in the ticket QR
  var CAP = 190;
  var KEY = "bv_phht2026_admitted";

  var countEl=document.getElementById("count"), capEl=document.getElementById("cap"),
      remainEl=document.getElementById("remain"), flashEl=document.getElementById("flash"),
      countBox=document.getElementById("countBox");
  var count = parseInt(localStorage.getItem(KEY)||"0",10) || 0;
  var locked=false, audio=null, scanner=null;
  capEl.textContent=" / "+CAP;

  function save(){ localStorage.setItem(KEY,String(count)); }
  function render(){
    countEl.textContent=count;
    var left=CAP-count;
    remainEl.textContent = left>=0 ? (left+" remaining") : (Math.abs(left)+" over capacity");
    countBox.classList.toggle("over", count>=CAP);
  }
  function flash(kind,msg){
    flashEl.className="flash "+kind; flashEl.textContent=msg;
    clearTimeout(flash._t);
    flash._t=setTimeout(function(){ flashEl.className="flash"; flashEl.textContent="Ready"; },1600);
  }
  function beep(ok){
    try{
      if(!audio) audio=new (window.AudioContext||window.webkitAudioContext)();
      var o=audio.createOscillator(), g=audio.createGain();
      o.connect(g); g.connect(audio.destination);
      o.frequency.value= ok?920:200; o.type="sine";
      g.gain.setValueAtTime(0.25,audio.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,audio.currentTime+0.18);
      o.start(); o.stop(audio.currentTime+0.2);
    }catch(e){}
  }
  function admit(){ count++; save(); render(); beep(true);
    flash("ok","Admitted  +1  ("+count+")"); }

  function onScan(text){
    text=(text||"").trim();
    document.getElementById("dbg").textContent = text ? ("read: "+text) : "";
    if(locked) return;
    if(text===EVENT_CODE){
      locked=true; admit(); setTimeout(function(){locked=false;},2200);
    } else {
      if(flashEl._bad) return;
      flashEl._bad=true; beep(false); flash("bad","Not a valid ticket");
      setTimeout(function(){flashEl._bad=false;},1500);
    }
  }

  document.getElementById("startBtn").onclick=function(){
    if(typeof Html5Qrcode==="undefined"){
      flash("bad","Scanner library didn't load - check internet, reload"); return; }
    if(scanner){ return; }
    if(!audio){ try{ audio=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    scanner=new Html5Qrcode("reader");
    var cfg={fps:10, qrbox:{width:260,height:260},
      formatsToSupport:[Html5QrcodeSupportedFormats.QR_CODE]};
    scanner.start({facingMode:"environment"}, cfg, onScan, function(){})
      .then(function(){ flash("","Scanning - aim at the QR square"); })
      .catch(function(err){
        scanner=null;
        flash("bad","Camera blocked - allow access, use Safari, over https");
      });
  };
  document.getElementById("stopBtn").onclick=function(){
    if(scanner){ scanner.stop().then(function(){scanner.clear();scanner=null;
      flashEl.className="flash"; flashEl.textContent="Stopped"; }).catch(function(){}); }
  };
  document.getElementById("plus").onclick=function(){ locked=true; admit();
    setTimeout(function(){locked=false;},300); };
  document.getElementById("minus").onclick=function(){ if(count>0){count--;save();render();
    flash("","Removed 1  ("+count+")");} };
  document.getElementById("reset").onclick=function(){
    if(confirm("Reset the count to 0? This clears the tally on this device.")){
      count=0; save(); render(); flash("","Count reset"); }
  };

  render();
})();
</script>
</body>
</html>
